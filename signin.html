<!DOCTYPE html>
<html lang ="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport"
        content="width=device-width, initial-scale=1.0">
        <title>Offishall Stores</title>
        <link rel="stylesheet" href="sign in styles.css">
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&display=swap">
        <link rel="stylesheet"  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"> 
    </head>
    <body>
        <div class="container">
            <div class="title">
                <h2><span class="offishall">OFFISHALL</span> <span class="stores">STORES</span></h2>
                <p>sign in to your account</p>
            </div>
            <form id="signinForm">
                <label for="email">Email</label>
                <input id="email" type="email" placeholder="Email" required>
                <label for="password">Password</label>
                <div class="password-container">
                    <input id="password" type="password" placeholder="Password" required>
                    <span class="toggle" onclick="togglepassword(event)"><i class="fas fa-eye"></i></span>
                </div>
                <button type="submit" class="btn">SIGN IN</button>
            </form>
            <div class="sign-up link">
                <p>Don't have an account? <a href="signup.html">Sign up</a></p>
            </div>
        </div>
        <script src="script.js"></script>
