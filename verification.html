<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport"
        content="width=device-width, initial-scale=1.0">
        <title>Offishall Stores</title>
        <link rel="stylesheet" href="sign in styles.css">
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&display=swap">
        <link rel="stylesheet"  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    </head>
    <body>
        <div class="container">
            <div class="title">
                <h2><span class="offishall">OFFISHALL</span> <span class="stores">STORES</span></h2>
                <p>Verify your account</p>
            </div>
            <form id="verificationForm">
                <label for="verification-code">Verification Code</label>
                <input type="text" id="codeInput" placeholder="Enter verification code" required>
                <button type="submit" class="btn">VERIFY</button>
            </form>
        </div>
        <script src="script.js"></script>
</html>
